<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Окно добавления пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
          background: #03050b;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 1.5rem;
          position: relative;
        }
        .account-container {
        linear-gradient(145deg, #6240b0, #392b70)
            max-width: 700px;
            margin: 40px auto;
        }

        .account-header {
        linear-gradient(145deg, #6240b0, #392b70)
            text-align: center;
            margin-bottom: 40px;
        }

        .account-header h1 {
           linear-gradient(145deg, #6240b0, #392b70)
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #FFFFFF;
            font-weight: 500;
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #EDD5D6;
            border-radius: 30px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: linear-gradient(145deg, #6240b0, #392b70);
        }

        .form-group input:focus {
            outline: none;
            border-color: #4A4455;
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(74, 68, 85, 0.1);
        }

        .form-group input::placeholder {
            color: #4A4455;
            opacity: 0.3;
        }

        .form-button {
            width: 100%;
            padding: 14px;
            background-color: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .form-button:hover {
            background-color: #2D2D2D;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45, 45, 45, 0.2);
        }

    </style>
</head>
<body>
<div class="account-container">
    <div class="account-header">
        <h1>Введите данные пользователя</h1>
    </div>
        <form method="POST">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" name="username" required placeholder="Введите имя пользователя">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" name="email" required placeholder="Введите email пользователя">
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required placeholder="Введите пароль пользователя">
        </div>
        <a href="{{ url_for('account') }}" class="form-button">Зарегистрировать пользователя</a>
    </form>

</div>
</body>
</html>
